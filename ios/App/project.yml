name: App

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  App:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
        excludes:
          - Base.lproj/Main.storyboard
          - public
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.purewater.mobile
        PRODUCT_NAME: App
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/App.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: VPNExtension
        embed: true

  VPNExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: VPNExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codex.purewater.mobile.VPNExtension
        PRODUCT_NAME: VPNExtension
        INFOPLIST_FILE: VPNExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: VPNExtension/VPNExtension.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
