name: Build iOS Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-ios-unsigned-ipa:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor iOS assets
        run: npx cap sync ios

      - name: Generate Xcode project
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          cd ios/App
          xcodegen generate

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Archive iOS app without signing
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean archive

      - name: Inject bundled web assets into app
        run: |
          rm -rf "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app/public"
          cp -R ios/App/App/public "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app/public"

      - name: Package unsigned IPA
        run: |
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app" "$RUNNER_TEMP/Payload/App.app"
          cd "$RUNNER_TEMP"
          zip -qry "$GITHUB_WORKSPACE/PureWater-Mobile-unsigned.ipa" Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureWater-Mobile-unsigned-ipa
          path: PureWater-Mobile-unsigned.ipa

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureWater-Mobile-xcarchive
          path: ${{ runner.temp }}/App.xcarchive
